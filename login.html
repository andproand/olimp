<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Авторизация | OlimpTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #080710;
      --card-bg: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.1);
      --text-color: #ffffff;
      --text-muted: #e5e5e5;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --accent: #06b6d4;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Glow Background Circles */
    .background {
      position: absolute;
      width: 430px;
      height: 430px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .background .shape {
      height: 200px;
      width: 200px;
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
    }

    .shape:first-child {
      background: linear-gradient(#1845ad, #23a2f6);
      left: -80px;
      top: -80px;
      animation: float-1 8s infinite alternate ease-in-out;
    }

    .shape:last-child {
      background: linear-gradient(to right, #ff512f, #f09819);
      right: -80px;
      bottom: -80px;
      animation: float-2 8s infinite alternate ease-in-out;
    }

    @keyframes float-1 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 20px) scale(1.1); }
    }

    @keyframes float-2 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-30px, -20px) scale(1.15); }
    }

    /* Form Container */
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 1.5rem;
      z-index: 10;
    }

    form {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }

    form:hover {
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .icon {
      font-size: 3.5rem;
      display: inline-block;
      margin-bottom: 0.75rem;
      animation: bounce 4s infinite ease-in-out;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1.2;
      background: linear-gradient(135deg, #ffffff 30%, #e0e7ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #a5b4fc;
      margin-top: 0.5rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    input {
      display: block;
      width: 100%;
      height: 50px;
      background-color: rgba(255, 255, 255, 0.07);
      border-radius: 12px;
      padding: 0 1rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 0.95rem;
      font-weight: 400;
      color: #fff;
      outline: none;
      transition: all 0.3s ease;
    }

    input:focus {
      background-color: rgba(255, 255, 255, 0.12);
      border-color: #818cf8;
      box-shadow: 0 0 15px rgba(129, 140, 248, 0.25);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: none;
      animation: fadeIn 0.3s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    button {
      margin-top: 1rem;
      width: 100%;
      background-color: #ffffff;
      color: #080710;
      padding: 15px 0;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
    }

    button:hover {
      background-color: #e0e7ff;
      transform: translateY(-1px);
      box-shadow: 0 5px 15px rgba(255, 255, 255, 0.15);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,0.1);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="background">
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <div class="login-container">
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="header">
        <span class="icon">🏆</span>
        <h3>OlimpTracker</h3>
        <p class="subtitle">Вход в панель</p>
      </div>

      <div class="error-msg" id="error-box"></div>

      <div class="form-group">
        <label for="username">Имя пользователя</label>
        <input type="text" id="username" required autocomplete="username" placeholder="Имя пользователя">
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
      </div>

      <button type="submit" id="submit-btn">
        <span>Войти</span>
        <span class="spinner" id="btn-spinner"></span>
      </button>
    </form>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('submit-btn');
      const spinner = document.getElementById('btn-spinner');
      const errorBox = document.getElementById('error-box');

      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      errorBox.style.display = 'none';
      submitBtn.disabled = true;
      spinner.style.display = 'inline-block';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        
        if (res.ok && data.success) {
          window.location.reload();
        } else {
          errorBox.textContent = data.error || 'Неверное имя пользователя или пароль';
          errorBox.style.display = 'block';
          submitBtn.disabled = false;
          spinner.style.display = 'none';
        }
      } catch (err) {
        errorBox.textContent = 'Ошибка сети: не удалось связаться с сервером';
        errorBox.style.display = 'block';
        submitBtn.disabled = false;
        spinner.style.display = 'none';
      }
    }
  </script>
</body>
</html>
