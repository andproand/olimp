version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: olymptracker-server
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:1tGythIngPZJeuZ@n8n-postgres-1:5432/olymptracker_db?schema=public
      - PORT=3001
    networks:
      - default
      - n8n_network # Placeholder name, user needs to verify

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: olymptracker-client
    restart: always
    ports:
      - "3000:80" # Serving static files via Nginx or similar
    depends_on:
      - server
    networks:
      - default

networks:
  default:
  n8n_network:
    external: true
    name: n8n_default # Inferred from folder /opt/beget/n8n
